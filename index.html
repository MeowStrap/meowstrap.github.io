<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeowStrap – Roblox Mods & Fast Flags</title>
    <link rel="icon" href="MeowStrap icon.png" type="image/png" />

    <!-- Google Font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0d15;
            font-family: 'Inter', sans-serif;
            color: #eef2fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* subtle animated gradient orbs (froststrap‑like atmosphere) */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 500px;
            height: 500px;
            background: #6c3ce0;
            top: -150px;
            left: -100px;
        }
        body::after {
            width: 600px;
            height: 600px;
            background: #f5576c;
            bottom: -200px;
            right: -150px;
        }

        /* ---------- CANVAS (falling icons) ---------- */
        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ---------- MAIN CARD (froststrap‑style glass panel) ---------- */
        .main-card {
            position: relative;
            z-index: 2;
            max-width: 820px;
            width: 100%;
            background: rgba(18, 22, 36, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 48px 44px 44px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.2s;
        }

        /* ---------- LOGO ---------- */
        .logo-wrapper {
            margin-bottom: 6px;
        }
        .logo-wrapper img {
            width: 130px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(245, 87, 108, 0.25));
            transition: transform 0.3s ease;
        }
        .logo-wrapper img:hover {
            transform: scale(1.03);
        }

        /* ---------- TITLE ---------- */
        .brand-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f5a623, #f5576c, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            line-height: 1.1;
        }
        .brand-sub {
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.3px;
            margin-bottom: 28px;
        }

        /* ---------- FEATURE GRID (froststrap‑style cards) ---------- */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 16px;
            width: 100%;
            margin-bottom: 32px;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 18px 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.25s ease, transform 0.2s ease, border-color 0.2s;
            backdrop-filter: blur(4px);
        }
        .feature-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(245, 87, 108, 0.25);
            transform: translateY(-2px);
        }
        .feature-card .emoji {
            font-size: 26px;
            display: block;
            margin-bottom: 6px;
        }
        .feature-card h4 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
        }
        .feature-card p {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.4;
            margin: 0;
        }

        /* ---------- DOWNLOAD BUTTON (froststrap style) ---------- */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 44px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #f5576c, #a855f7);
            border: none;
            border-radius: 60px;
            text-decoration: none;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 32px rgba(245, 87, 108, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            text-transform: none;
            position: relative;
            overflow: hidden;
        }
        .download-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, #a855f7, #f5576c);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .download-btn:hover::after {
            opacity: 1;
        }
        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(245, 87, 108, 0.45);
        }
        .download-btn:active {
            transform: scale(0.96);
        }
        .download-btn span,
        .download-btn svg {
            position: relative;
            z-index: 1;
        }
        .download-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* ---------- FOOTER ---------- */
        .footer-note {
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.2px;
        }
        .footer-note a {
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-note a:hover {
            color: #f5a623;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 640px) {
            .main-card {
                padding: 32px 20px 28px;
                border-radius: 32px;
            }
            .brand-title {
                font-size: 30px;
            }
            .brand-sub {
                font-size: 13px;
                margin-bottom: 22px;
            }
            .feature-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .feature-card {
                padding: 14px 10px;
            }
            .feature-card .emoji {
                font-size: 22px;
            }
            .download-btn {
                padding: 14px 32px;
                font-size: 16px;
            }
            .logo-wrapper img {
                width: 100px;
            }
        }

        @media (max-width: 430px) {
            .feature-grid {
                grid-template-columns: 1fr;
            }
            .main-card {
                padding: 24px 16px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Falling icons canvas -->
    <canvas id="snowCanvas"></canvas>

    <!-- Main card -->
    <div class="main-card">

        <!-- Logo -->
        <div class="logo-wrapper">
            <img src="MeowStrap icon.png" alt="MeowStrap" />
        </div>

        <!-- Brand -->
        <div class="brand-title">MeowStrap</div>
        <div class="brand-sub">Roblox Mod Loader · Fast Flags · Open Source</div>

        <!-- Feature grid (froststrap style) -->
        <div class="feature-grid">
            <div class="feature-card">
                <span class="emoji">🧩</span>
                <h4>Mods</h4>
                <p> amp;</p>
            </div>
           
            <div class="feature-card">
                <span class="emoji">🌐</span>
                <h4>Open Source</h4>
                <p></p>
            </div>
        </div>

        <!-- Download button -->
        <a href="https://github.com/MeowStrap/MeowStrap-ROBLOX/releases" target="_blank" class="download-btn">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M5 20h14v-2H5v2zm7-18v12.17l3.59-3.58L17 12l-5 5-5-5 1.41-1.41L12 14.17V2z"/></svg>
            <span>Download</span>
        </a>

        <!-- Footer -->
        <div class="footer-note">
            <a href="https://github.com/MeowStrap/MeowStrap-ROBLOX" target="_blank">GitHub</a>
            &nbsp;·&nbsp; MeowStrap
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('snowCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            const icon = new Image();
            icon.src = 'MeowStrap icon.png';

            let particles = [];

            const PARTICLE_COUNT = 100;
            const MIN_SIZE = 14;
            const MAX_SIZE = 38;
            const MIN_SPEED = 0.4;
            const MAX_SPEED = 1.8;
            const WIND = 0.15;

            function createParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const size = Math.random() * (MAX_SIZE - MIN_SIZE) + MIN_SIZE;
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height - height,
                        size: size,
                        speed: Math.random() * (MAX_SPEED - MIN_SPEED) + MIN_SPEED,
                        rotation: Math.random() * 360,
                        rotSpeed: (Math.random() - 0.5) * 0.02,
                        opacity: Math.random() * 0.5 + 0.3,
                        drift: (Math.random() - 0.5) * WIND,
                    });
                }
            }

            function updateParticles() {
                for (let p of particles) {
                    p.y += p.speed;
                    p.x += p.drift + Math.sin(p.y * 0.005) * 0.25;
                    p.rotation += p.rotSpeed;

                    if (p.y > height + p.size) {
                        p.y = -p.size;
                        p.x = Math.random() * width;
                    }
                    if (p.x < -p.size) p.x = width + p.size;
                    if (p.x > width + p.size) p.x = -p.size;
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);

                if (!icon.complete || !icon.naturalWidth) {
                    for (let p of particles) {
                        ctx.save();
                        ctx.globalAlpha = p.opacity;
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rotation * Math.PI / 180);
                        ctx.beginPath();
                        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                        ctx.fillStyle = '#a78bfa';
                        ctx.shadowColor = 'rgba(167,139,250,0.3)';
                        ctx.shadowBlur = 12;
                        ctx.fill();
                        ctx.restore();
                    }
                    return;
                }

                for (let p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.drawImage(icon, -p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                }
            }

            function animate() {
                updateParticles();
                drawParticles();
                requestAnimationFrame(animate);
            }

            icon.onload = function() {
                createParticles();
                animate();
            };

            if (icon.complete && icon.naturalWidth) {
                createParticles();
                animate();
            } else {
                icon.onerror = function() {
                    createParticles();
                    animate();
                };
            }

            window.addEventListener('resize', function() {
                resize();
                createParticles();
            });
        })();
    </script>

</body>
</html>
