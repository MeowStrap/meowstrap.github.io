<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="yandex-verification" content="7b7c9ab62fd5b3c9" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeowStrap – Roblox Mods & Fast Flags</title>
    <link rel="icon" href="MeowStrap icon.png" type="image/png" />

    <!-- Google Font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0d15;
            font-family: 'Inter', sans-serif;
            color: #eef2fb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* subtle animated gradient orbs (froststrap‑like atmosphere) */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 500px;
            height: 500px;
            background: #6c3ce0;
            top: -150px;
            left: -100px;
        }
        body::after {
            width: 600px;
            height: 600px;
            background: #f5576c;
            bottom: -200px;
            right: -150px;
        }

        /* ---------- CANVAS (falling icons) ---------- */
        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ---------- MAIN CARD (froststrap‑style glass panel) ---------- */
        .main-card {
            position: relative;
            z-index: 2;
            max-width: 820px;
            width: 100%;
            background: rgba(18, 22, 36, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 48px 44px 44px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.2s;
        }

        /* ---------- TOP BAR (auth button) ---------- */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .auth-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.2px;
        }
        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(245, 87, 108, 0.3);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(245, 87, 108, 0.15);
        }
        .auth-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .auth-btn .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5576c, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        /* ---------- LOGO ---------- */
        .logo-wrapper {
            margin-bottom: 6px;
        }
        .logo-wrapper img {
            width: 130px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(245, 87, 108, 0.25));
            transition: transform 0.3s ease;
        }
        .logo-wrapper img:hover {
            transform: scale(1.03);
        }

        /* ---------- TITLE ---------- */
        .brand-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f5a623, #f5576c, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            line-height: 1.1;
        }
        .brand-sub {
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.3px;
            margin-bottom: 28px;
        }

        /* ---------- FEATURE GRID (froststrap‑style cards) ---------- */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 16px;
            width: 100%;
            margin-bottom: 32px;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 18px 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.25s ease, transform 0.2s ease, border-color 0.2s;
            backdrop-filter: blur(4px);
        }
        .feature-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(245, 87, 108, 0.25);
            transform: translateY(-2px);
        }
        .feature-card .emoji {
            font-size: 26px;
            display: block;
            margin-bottom: 6px;
        }
        .feature-card h4 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
        }
        .feature-card p {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.4;
            margin: 0;
        }

        /* ---------- DOWNLOAD BUTTON (froststrap style) ---------- */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 44px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #f5576c, #a855f7);
            border: none;
            border-radius: 60px;
            text-decoration: none;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 32px rgba(245, 87, 108, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            text-transform: none;
            position: relative;
            overflow: hidden;
        }
        .download-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, #a855f7, #f5576c);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .download-btn:hover::after {
            opacity: 1;
        }
        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(245, 87, 108, 0.45);
        }
        .download-btn:active {
            transform: scale(0.96);
        }
        .download-btn span,
        .download-btn svg {
            position: relative;
            z-index: 1;
        }
        .download-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* ---------- FOOTER ---------- */
        .footer-note {
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.2px;
        }
        .footer-note a {
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-note a:hover {
            color: #f5a623;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 640px) {
            .main-card {
                padding: 32px 20px 28px;
                border-radius: 32px;
            }
            .brand-title {
                font-size: 30px;
            }
            .brand-sub {
                font-size: 13px;
                margin-bottom: 22px;
            }
            .feature-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .feature-card {
                padding: 14px 10px;
            }
            .feature-card .emoji {
                font-size: 22px;
            }
            .download-btn {
                padding: 14px 32px;
                font-size: 16px;
            }
            .logo-wrapper img {
                width: 100px;
            }
            .top-bar {
                margin-bottom: 6px;
            }
            .auth-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            .auth-btn .user-avatar {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }
        }

        @media (max-width: 430px) {
            .feature-grid {
                grid-template-columns: 1fr;
            }
            .main-card {
                padding: 24px 16px 20px;
            }
        }

        /* ---------- MODAL OVERLAY ---------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 20px;
            animation: modalFadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(12px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-box {
            background: rgba(18, 22, 36, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 36px 36px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 18px;
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: rgba(255, 255, 255, 0.4);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        .modal-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 28px;
        }

        /* tabs */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .auth-tab {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .auth-tab.active {
            background: rgba(245, 87, 108, 0.2);
            color: #fff;
            box-shadow: 0 2px 12px rgba(245, 87, 108, 0.15);
        }
        .auth-tab:hover:not(.active) {
            color: rgba(255, 255, 255, 0.7);
        }

        /* form */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form .form-group {
            text-align: left;
        }
        .auth-form label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
            letter-spacing: 0.2px;
        }
        .auth-form input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.25s ease;
            outline: none;
        }
        .auth-form input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        .auth-form input:focus {
            border-color: rgba(245, 87, 108, 0.4);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(245, 87, 108, 0.06);
        }

        .auth-form .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #f5576c, #a855f7);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(245, 87, 108, 0.2);
            margin-top: 4px;
        }
        .auth-form .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(245, 87, 108, 0.35);
        }
        .auth-form .submit-btn:active {
            transform: scale(0.97);
        }

        .auth-form .form-footer {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 4px;
        }
        .auth-form .form-footer a {
            color: rgba(245, 87, 108, 0.7);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }
        .auth-form .form-footer a:hover {
            color: #f5576c;
        }

        /* auth message */
        .auth-message {
            text-align: center;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 12px;
            margin-top: 4px;
            display: none;
        }
        .auth-message.error {
            display: block;
            background: rgba(245, 87, 108, 0.12);
            color: #f5576c;
            border: 1px solid rgba(245, 87, 108, 0.15);
        }
        .auth-message.success {
            display: block;
            background: rgba(76, 175, 80, 0.12);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.15);
        }

        /* logged in state */
        .auth-btn.logged-in {
            background: rgba(76, 175, 80, 0.12);
            border-color: rgba(76, 175, 80, 0.2);
        }
        .auth-btn.logged-in:hover {
            background: rgba(76, 175, 80, 0.2);
            border-color: rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>

    <!-- Falling icons canvas -->
    <canvas id="snowCanvas"></canvas>

    <!-- Main card -->
    <div class="main-card">

        <!-- Top bar with auth button -->
        <div class="top-bar">
            <button class="auth-btn" id="authToggleBtn" aria-label="Sign in or register">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>
                <span id="authBtnLabel">Sign In</span>
            </button>
        </div>

        <!-- Logo -->
        <div class="logo-wrapper">
            <img src="MeowStrap icon.png" alt="MeowStrap" />
        </div>

        <!-- Brand -->
        <div class="brand-title">MeowStrap</div>
        <div class="brand-sub">Roblox Mod Loader · Fast Flags · Open Source</div>

        <!-- Feature grid -->
        <div class="feature-grid">
            <div class="feature-card">
                <span class="emoji">🧩</span>
                <h4>Mods</h4>
                <p>&amp;</p>
            </div>
            <div class="feature-card">
                <span class="emoji">🌐</span>
                <h4>Open Source</h4>
                <p></p>
            </div>
        </div>

        <!-- Download button -->
        <a href="https://github.com/MeowStrap/MeowStrap-ROBLOX/releases" target="_blank" class="download-btn">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M5 20h14v-2H5v2zm7-18v12.17l3.59-3.58L17 12l-5 5-5-5 1.41-1.41L12 14.17V2z"/></svg>
            <span>Download</span>
        </a>

        <!-- Footer -->
        <div class="footer-note">
            <a href="https://github.com/MeowStrap/MeowStrap-ROBLOX" target="_blank">GitHub</a>
            &nbsp;·&nbsp; MeowStrap
        </div>
    </div>

    <!-- ========== AUTH MODAL ========== -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-box">

            <button class="modal-close" id="modalCloseBtn" aria-label="Close">✕</button>

            <div class="modal-title" id="modalTitle">Welcome Back</div>
            <div class="modal-sub" id="modalSub">Sign in to your MeowStrap account</div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" id="tabLogin">Sign In</button>
                <button class="auth-tab" data-tab="register" id="tabRegister">Register</button>
            </div>

            <!-- Form -->
            <form class="auth-form" id="authForm" autocomplete="off">
                <div class="form-group">
                    <label for="authEmail">Email or Username</label>
                    <input type="text" id="authEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="authPassword">Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••" required />
                </div>
                <div class="auth-message" id="authMessage"></div>
                <button type="submit" class="submit-btn" id="authSubmitBtn">Sign In</button>
                <div class="form-footer">
                    <span id="formFooterText">Don't have an account?</span>
                    <a id="formFooterLink">Register</a>
                </div>
            </form>

        </div>
    </div>

    <script>
        (function() {
            // ---------- CANVAS (falling icons) ----------
            const canvas = document.getElementById('snowCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            const icon = new Image();
            icon.src = 'MeowStrap icon.png';

            let particles = [];

            const PARTICLE_COUNT = 100;
            const MIN_SIZE = 14;
            const MAX_SIZE = 38;
            const MIN_SPEED = 0.4;
            const MAX_SPEED = 1.8;
            const WIND = 0.15;

            function createParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const size = Math.random() * (MAX_SIZE - MIN_SIZE) + MIN_SIZE;
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height - height,
                        size: size,
                        speed: Math.random() * (MAX_SPEED - MIN_SPEED) + MIN_SPEED,
                        rotation: Math.random() * 360,
                        rotSpeed: (Math.random() - 0.5) * 0.02,
                        opacity: Math.random() * 0.5 + 0.3,
                        drift: (Math.random() - 0.5) * WIND,
                    });
                }
            }

            function updateParticles() {
                for (let p of particles) {
                    p.y += p.speed;
                    p.x += p.drift + Math.sin(p.y * 0.005) * 0.25;
                    p.rotation += p.rotSpeed;

                    if (p.y > height + p.size) {
                        p.y = -p.size;
                        p.x = Math.random() * width;
                    }
                    if (p.x < -p.size) p.x = width + p.size;
                    if (p.x > width + p.size) p.x = -p.size;
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);

                if (!icon.complete || !icon.naturalWidth) {
                    for (let p of particles) {
                        ctx.save();
                        ctx.globalAlpha = p.opacity;
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rotation * Math.PI / 180);
                        ctx.beginPath();
                        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                        ctx.fillStyle = '#a78bfa';
                        ctx.shadowColor = 'rgba(167,139,250,0.3)';
                        ctx.shadowBlur = 12;
                        ctx.fill();
                        ctx.restore();
                    }
                    return;
                }

                for (let p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.drawImage(icon, -p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                }
            }

            function animate() {
                updateParticles();
                drawParticles();
                requestAnimationFrame(animate);
            }

            icon.onload = function() {
                createParticles();
                animate();
            };

            if (icon.complete && icon.naturalWidth) {
                createParticles();
                animate();
            } else {
                icon.onerror = function() {
                    createParticles();
                    animate();
                };
            }

            window.addEventListener('resize', function() {
                resize();
                createParticles();
            });

            // ---------- AUTH LOGIC ----------
            const authToggleBtn = document.getElementById('authToggleBtn');
            const authBtnLabel = document.getElementById('authBtnLabel');
            const modal = document.getElementById('authModal');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const modalTitle = document.getElementById('modalTitle');
            const modalSub = document.getElementById('modalSub');
            const authForm = document.getElementById('authForm');
            const authEmail = document.getElementById('authEmail');
            const authPassword = document.getElementById('authPassword');
            const authSubmitBtn = document.getElementById('authSubmitBtn');
            const authMessage = document.getElementById('authMessage');
            const formFooterText = document.getElementById('formFooterText');
            const formFooterLink = document.getElementById('formFooterLink');

            let currentMode = 'login'; // 'login' | 'register'
            let isLoggedIn = false;
            let currentUser = null;

            // Simple in-memory "database"
            const users = {};

            function setMode(mode) {
                currentMode = mode;
                if (mode === 'login') {
                    modalTitle.textContent = 'Welcome Back';
                    modalSub.textContent = 'Sign in to your MeowStrap account';
                    authSubmitBtn.textContent = 'Sign In';
                    formFooterText.textContent = "Don't have an account?";
                    formFooterLink.textContent = 'Register';
                    tabLogin.classList.add('active');
                    tabRegister.classList.remove('active');
                    authMessage.className = 'auth-message';
                    authMessage.style.display = 'none';
                    authMessage.textContent = '';
                } else {
                    modalTitle.textContent = 'Create Account';
                    modalSub.textContent = 'Join the MeowStrap community';
                    authSubmitBtn.textContent = 'Register';
                    formFooterText.textContent = 'Already have an account?';
                    formFooterLink.textContent = 'Sign In';
                    tabRegister.classList.add('active');
                    tabLogin.classList.remove('active');
                    authMessage.className = 'auth-message';
                    authMessage.style.display = 'none';
                    authMessage.textContent = '';
                }
            }

            function showMessage(text, type) {
                authMessage.textContent = text;
                authMessage.className = 'auth-message ' + type;
                authMessage.style.display = 'block';
            }

            function hideMessage() {
                authMessage.className = 'auth-message';
                authMessage.style.display = 'none';
                authMessage.textContent = '';
            }

            function openModal(mode) {
                hideMessage();
                setMode(mode || 'login');
                authEmail.value = '';
                authPassword.value = '';
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                setTimeout(() => authEmail.focus(), 100);
            }

            function closeModal() {
                modal.classList.remove('active');
                document.body.style.overflow = '';
                hideMessage();
            }

            function updateAuthButton() {
                if (isLoggedIn && currentUser) {
                    const initial = currentUser.charAt(0).toUpperCase();
                    authToggleBtn.innerHTML = `
                        <span class="user-avatar">${initial}</span>
                        <span id="authBtnLabel">${currentUser}</span>
                    `;
                    authToggleBtn.classList.add('logged-in');
                } else {
                    authToggleBtn.innerHTML = `
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>
                        <span id="authBtnLabel">Sign In</span>
                    `;
                    authToggleBtn.classList.remove('logged-in');
                }
            }

            function handleAuthSubmit(e) {
                e.preventDefault();
                hideMessage();

                const email = authEmail.value.trim();
                const password = authPassword.value.trim();

                if (!email || !password) {
                    showMessage('Please fill in all fields.', 'error');
                    return;
                }

                if (currentMode === 'login') {
                    // Login
                    if (users[email] && users[email].password === password) {
                        isLoggedIn = true;
                        currentUser = users[email].username || email;
                        updateAuthButton();
                        showMessage('Welcome back, ' + currentUser + '! 🎉', 'success');
                        setTimeout(() => {
                            closeModal();
                        }, 900);
                    } else if (users[email]) {
                        showMessage('Incorrect password. Try again.', 'error');
                    } else {
                        showMessage('No account found with that email. Please register.', 'error');
                    }
                } else {
                    // Register
                    if (users[email]) {
                        showMessage('An account with this email already exists. Please sign in.', 'error');
                        return;
                    }
                    if (password.length < 4) {
                        showMessage('Password must be at least 4 characters.', 'error');
                        return;
                    }
                    // Extract username from email or use a default
                    const username = email.split('@')[0] || 'User';
                    users[email] = { password, username };
                    isLoggedIn = true;
                    currentUser = username;
                    updateAuthButton();
                    showMessage('Account created! Welcome, ' + username + ' 🎉', 'success');
                    setTimeout(() => {
                        closeModal();
                    }, 1000);
                }
            }

            // ---------- EVENT LISTENERS ----------
            authToggleBtn.addEventListener('click', function(e) {
                if (isLoggedIn) {
                    // If logged in, clicking opens modal to manage account or logout
                    // We'll just open the modal in login mode as a simple approach
                    openModal('login');
                } else {
                    openModal('login');
                }
            });

            modalCloseBtn.addEventListener('click', closeModal);

            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeModal();
                }
            });

            tabLogin.addEventListener('click', function() {
                setMode('login');
            });

            tabRegister.addEventListener('click', function() {
                setMode('register');
            });

            formFooterLink.addEventListener('click', function() {
                if (currentMode === 'login') {
                    setMode('register');
                } else {
                    setMode('login');
                }
            });

            authForm.addEventListener('submit', handleAuthSubmit);

            // ---------- INIT ----------
            updateAuthButton();

            // Pre-fill demo account for testing
            users['demo@meowstrap.com'] = { password: 'demo123', username: 'DemoUser' };
            users['test@meowstrap.com'] = { password: 'test123', username: 'TestUser' };

            console.log('🔐 MeowStrap Auth ready!');
            console.log('📝 Demo accounts: demo@meowstrap.com / demo123  |  test@meowstrap.com / test123');

        })();
    </script>

</body>
</html>
